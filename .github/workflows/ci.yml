name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  git_identity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          # On pull_request events the default checkout is GitHub's SYNTHETIC test-merge commit
          # (committer "GitHub <noreply@github.com>") — exactly what this gate exists to reject on
          # real history. Check the PR head itself instead; push events keep the pushed ref.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: All commits carry the neutral maintainer identity (fast-catch backstop; see script)
        run: scripts/ci/check-git-identity.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Secret scan (gitleaks CLI, free — the org-gated action needs a paid license)
        run: |
          set -eu
          GL=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-git
      - run: python -m pip install -U pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
      - run: python -m build
      - run: python -m venv /tmp/panella-wheel
      - run: /tmp/panella-wheel/bin/pip install dist/*.whl
      - run: /tmp/panella-wheel/bin/panella-render-config --out /tmp/panella-dist-config
      - run: /tmp/panella-wheel/bin/python -c "import panella; import panella_selfhost"

  boot_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e .
      - name: Boot compose stack and assert served/auth/config gates
        run: scripts/ci/boot-check.sh

  supply_chain_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      # Resolve panella's SHIPPED runtime dependency tree into an ISOLATED venv, then audit only that
      # tree. CI-only scanner tooling (pip-audit / cyclonedx / pip-licenses transitive deps — e.g.
      # chardet, which is LGPL and pulled in by cyclonedx-bom) must NEVER enter the audited set, or a
      # scanner's own dep would falsely gate panella's licenses/CVEs.
      - name: Resolve runtime dependency tree
        run: |
          set -eu
          python -m venv /tmp/panella-rt
          /tmp/panella-rt/bin/pip install -U pip
          /tmp/panella-rt/bin/pip install .
          /tmp/panella-rt/bin/pip freeze --exclude-editable | grep -viE '^panella([ @=]|$)' > /tmp/panella-rt-reqs.txt
          echo "runtime deps:"; cat /tmp/panella-rt-reqs.txt
      - name: pip-audit (runtime tree only)
        run: |
          set -eu
          python -m pip install 'pip-audit>=2.10,<3'
          pip-audit -r /tmp/panella-rt-reqs.txt --progress-spinner off
      - name: License scan (runtime tree only)
        run: |
          set -eu
          /tmp/panella-rt/bin/pip install 'pip-licenses>=5.5,<6'
          PATH="/tmp/panella-rt/bin:$PATH" /tmp/panella-rt/bin/python scripts/ci/check-licenses.py --requirements /tmp/panella-rt-reqs.txt
      - name: Generate CycloneDX SBOM (runtime tree)
        run: |
          set -eu
          mkdir -p sbom
          python -m pip install 'cyclonedx-bom>=7.3,<8'
          cyclonedx-py requirements /tmp/panella-rt-reqs.txt --output-format JSON --output-file sbom/panella.cdx.json \
            || cyclonedx-py requirements /tmp/panella-rt-reqs.txt --of JSON -o sbom/panella.cdx.json
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("sbom/panella.cdx.json")
          data = json.loads(path.read_text())
          assert data.get("bomFormat") == "CycloneDX", data.get("bomFormat")
          print(f"sbom=pass path={path} components={len(data.get('components', []))}")
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: panella-cyclonedx-sbom
          path: sbom/panella.cdx.json
          if-no-files-found: error
      - name: Build package artifacts
        run: |
          python -m pip install 'build>=1.5,<2'
          python -m build
      - name: Wheel and sdist contents scan
        run: python scripts/ci/check-wheel-contents.py dist

  trivy_image_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build store image
        run: docker build --target store -t panella-store-ci:${{ github.sha }} .
      - name: Store image is CPU-slim (size gate + no CUDA residue)
        run: |
          set -euo pipefail
          bytes="$(docker image inspect panella-store-ci:${{ github.sha }} --format '{{.Size}}')"
          limit=$((3 * 1024 * 1024 * 1024))
          human="$(python3 -c "print(f'{$bytes/1024/1024/1024:.2f} GiB')")"
          echo "store image size: $human ($bytes bytes); limit 3.00 GiB"
          if [ "$bytes" -ge "$limit" ]; then
            echo "C0-3b FAIL: store image $human >= 3 GiB — the CUDA torch closure was likely reintroduced"
            docker history --no-trunc panella-store-ci:${{ github.sha }} | head -25
            exit 1
          fi
          # Defense-in-depth vs the Dockerfile build assert: no CUDA/nvidia/triton packages shipped.
          residue="$(docker run --rm --entrypoint sh panella-store-ci:${{ github.sha }} -c "pip list --format=freeze | grep -iE '(^nvidia|^cuda|triton)' || true")"
          if [ -n "$residue" ]; then
            echo "C0-3b FAIL: CUDA residue in shipped image:"; echo "$residue"; exit 1
          fi
          echo "C0-3b OK: store image CPU-slim, no CUDA residue"
      - name: Build app image
        run: docker build --target app -t panella-app-ci:${{ github.sha }} .
      - name: Trivy scan store image
        # Report-only for now: the scan RUNS on every CI and prints fixable HIGH/CRITICAL vulns for
        # visibility (exit-code=1 + ignore-unfixed=true surfaces only the actionable set), but
        # continue-on-error keeps it from blocking merges on base-image CVE lag the product cannot
        # patch from CI. Flip to blocking (remove continue-on-error) once the base image is
        # pinned/patched — tracked follow-up.
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: panella-store-ci:${{ github.sha }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          format: table
      - name: Trivy scan app image
        continue-on-error: true  # report-only (see the store scan above)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: panella-app-ci:${{ github.sha }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          # Fail only on FIXABLE HIGH/CRITICAL vulns — unfixed upstream/base-image CVEs are not
          # actionable and would block every merge for issues we cannot resolve.
          ignore-unfixed: "true"
          format: table
      # C0-3a sentinels are anchored to the ==10.67.1 pin; bumping the pin must re-review
      # guard_patch + these greps (guard_patch's version assert fails the build first).
      - name: Build CI-only deterministic hash-fallback target
        run: docker build --target store-hash-fallback-test -t panella-store-hashtest:${{ github.sha }} .
      - name: Airgap Case A — baked model loads without fallback
        run: |
          set -eu
          # --debug overrides the stock CMD only to make INFO logs visible: the positive
          # sentinel below is logger.info, and the stock invocation configures no root
          # handler (upstream basicConfig runs only under --debug; cli/main.py:129).
          # The embedding code path is identical either way.
          docker run -d --name airgap-a --network none -e MCP_API_KEY=ci-airgap-dummy -v /data panella-store-ci:${{ github.sha }} memory server --http --debug
          for attempt in $(seq 1 60); do
            status="$(docker inspect -f '{{.State.Health.Status}}' airgap-a)"
            [ "$status" = healthy ] && break
            sleep 3
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' airgap-a)" = healthy ] || { docker logs airgap-a 2>&1; exit 1; }
          docker logs airgap-a 2>&1 | grep -q "Embedding model loaded successfully"
          docker logs airgap-a 2>&1 | grep -q "embedding preflight: success"
          # Explicit if/exit per marker: under `set -e` a `!`-inverted command never aborts
          # the step, so a bare `! grep` loop would gate on the LAST marker only.
          docker logs airgap-a > /tmp/airgap-a.log 2>&1
          for marker in \
            "Falling back to pure-Python hash embeddings" \
            "using pure-Python hash embeddings" \
            "Attempting normal model loading" \
            "Failed to load from cache" \
            "Attempting to download" \
            "ONNX model creation failed"; do
            if grep -qiF "$marker" /tmp/airgap-a.log; then
              echo "forbidden marker present: $marker"
              exit 1
            fi
          done
      - name: Airgap Case B — guard rejects deterministic hash fallback
        run: |
          set -eu
          docker run -d --name airgap-b --network none -e MCP_API_KEY=ci-airgap-dummy -e PANELLA_SKIP_EMBEDDING_PREFLIGHT=1 -v /data panella-store-hashtest:${{ github.sha }}
          for attempt in $(seq 1 40); do
            [ "$(docker inspect -f '{{.State.Status}}' airgap-b)" = exited ] && break
            sleep 3
          done
          [ "$(docker inspect -f '{{.State.Status}}' airgap-b)" = exited ] || { docker logs airgap-b 2>&1; exit 1; }
          [ "$(docker inspect -f '{{.State.ExitCode}}' airgap-b)" != 0 ]
          docker logs airgap-b 2>&1 | grep -q "PANELLA: refusing pure-Python hash-embedding fallback"
      - name: Airgap Case C — explicit breakglass permits hash fallback
        run: |
          set -eu
          docker run -d --name airgap-c --network none -e MCP_API_KEY=ci-airgap-dummy -e PANELLA_SKIP_EMBEDDING_PREFLIGHT=1 -e PANELLA_REQUIRE_REAL_EMBEDDINGS=0 -v /data panella-store-hashtest:${{ github.sha }}
          for attempt in $(seq 1 60); do
            status="$(docker inspect -f '{{.State.Health.Status}}' airgap-c)"
            [ "$status" = healthy ] && break
            sleep 3
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' airgap-c)" = healthy ] || { docker logs airgap-c 2>&1; exit 1; }
          docker logs airgap-c 2>&1 | grep -qF "EMBEDDING PREFLIGHT SKIPPED"
          docker logs airgap-c 2>&1 | grep -qF "HASH FALLBACK BREAKGLASS ENABLED"
          docker logs airgap-c 2>&1 | grep -qiF "hash embeddings"
      - name: Remove airgap test containers
        if: always()
        run: docker rm -f airgap-a airgap-b airgap-c || true
