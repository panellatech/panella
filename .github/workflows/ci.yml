name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  git_identity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          # On pull_request events the default checkout is GitHub's SYNTHETIC test-merge commit
          # (committer "GitHub <noreply@github.com>") — exactly what this gate exists to reject on
          # real history. Check the PR head itself instead; push events keep the pushed ref.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: All commits carry the neutral maintainer identity (fast-catch backstop; see script)
        run: scripts/ci/check-git-identity.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secret scan (gitleaks CLI, free — the org-gated action needs a paid license)
        run: |
          set -eu
          GL=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-git
      - run: python -m pip install -U pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
      - run: python -m build
      - run: python -m venv /tmp/panella-wheel
      - run: /tmp/panella-wheel/bin/pip install dist/*.whl
      - run: /tmp/panella-wheel/bin/panella-render-config --out /tmp/panella-dist-config
      - run: /tmp/panella-wheel/bin/python -c "import panella; import panella_selfhost"

  boot_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: python -m pip install -e .
      - name: Boot compose stack and assert served/auth/config gates
        run: scripts/ci/boot-check.sh

  supply_chain_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      # Resolve panella's SHIPPED runtime dependency tree into an ISOLATED venv, then audit only that
      # tree. CI-only scanner tooling (pip-audit / cyclonedx / pip-licenses transitive deps — e.g.
      # chardet, which is LGPL and pulled in by cyclonedx-bom) must NEVER enter the audited set, or a
      # scanner's own dep would falsely gate panella's licenses/CVEs.
      - name: Resolve runtime dependency tree
        run: |
          set -eu
          python -m venv /tmp/panella-rt
          /tmp/panella-rt/bin/pip install -U pip
          /tmp/panella-rt/bin/pip install .
          /tmp/panella-rt/bin/pip freeze --exclude-editable | grep -viE '^panella([ @=]|$)' > /tmp/panella-rt-reqs.txt
          echo "runtime deps:"; cat /tmp/panella-rt-reqs.txt
      - name: pip-audit (runtime tree only)
        run: |
          set -eu
          python -m pip install 'pip-audit>=2.10,<3'
          pip-audit -r /tmp/panella-rt-reqs.txt --progress-spinner off
      - name: License scan (runtime tree only)
        run: |
          set -eu
          /tmp/panella-rt/bin/pip install 'pip-licenses>=5.5,<6'
          PATH="/tmp/panella-rt/bin:$PATH" /tmp/panella-rt/bin/python scripts/ci/check-licenses.py --requirements /tmp/panella-rt-reqs.txt
      - name: Generate CycloneDX SBOM (runtime tree)
        run: |
          set -eu
          mkdir -p sbom
          python -m pip install 'cyclonedx-bom>=7.3,<8'
          cyclonedx-py requirements /tmp/panella-rt-reqs.txt --output-format JSON --output-file sbom/panella.cdx.json \
            || cyclonedx-py requirements /tmp/panella-rt-reqs.txt --of JSON -o sbom/panella.cdx.json
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("sbom/panella.cdx.json")
          data = json.loads(path.read_text())
          assert data.get("bomFormat") == "CycloneDX", data.get("bomFormat")
          print(f"sbom=pass path={path} components={len(data.get('components', []))}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: panella-cyclonedx-sbom
          path: sbom/panella.cdx.json
          if-no-files-found: error
      - name: Build package artifacts
        run: |
          python -m pip install 'build>=1.5,<2'
          python -m build
      - name: Wheel and sdist contents scan
        run: python scripts/ci/check-wheel-contents.py dist

  trivy_image_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build store image
        run: docker build --target store -t panella-store-ci:${{ github.sha }} .
      - name: Build app image
        run: docker build --target app -t panella-app-ci:${{ github.sha }} .
      - name: Trivy scan store image
        # Report-only for now: the scan RUNS on every CI and prints fixable HIGH/CRITICAL vulns for
        # visibility (exit-code=1 + ignore-unfixed=true surfaces only the actionable set), but
        # continue-on-error keeps it from blocking merges on base-image CVE lag the product cannot
        # patch from CI. Flip to blocking (remove continue-on-error) once the base image is
        # pinned/patched — tracked follow-up.
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: panella-store-ci:${{ github.sha }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          format: table
      - name: Trivy scan app image
        continue-on-error: true  # report-only (see the store scan above)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: panella-app-ci:${{ github.sha }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          # Fail only on FIXABLE HIGH/CRITICAL vulns — unfixed upstream/base-image CVEs are not
          # actionable and would block every merge for issues we cannot resolve.
          ignore-unfixed: "true"
          format: table
