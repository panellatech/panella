# Release images are explicit and pinnable: no latest tag is ever published.
# Pre-flip dispatch testing publishes private GHCR images tagged only with sha/test refs.
# Keyless signing and Rekor transparency run only on tag releases (refs/tags/v*).
# Pre-flip workflow_dispatch builds never write to Rekor; exposure begins with the first real tag
# release.
#
# Build-once-and-promote (issue #58): each image is built exactly once and pushed BY DIGEST
# (untagged staging), Trivy scans every per-platform digest of that exact pushed index, and only
# then are the release tags created from the same index — with a digest-equality assert — so the
# bytes Trivy scanned, the bytes the release tags point at, and the bytes cosign signs are
# cryptographically the same artifact. A failed scan leaves only untagged, unsigned staging
# manifests behind (no release tag ever points at unscanned bytes).
name: release-images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  STORE_IMAGE: ghcr.io/panellatech/panella-store
  APP_IMAGE: ghcr.io/panellatech/panella-app

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Assert release ref matches pyproject version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            expected="v${version}"
            if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${expected}" ]]; then
              echo "::error title=Release tag mismatch::expected ${expected}, got ${GITHUB_REF}" >&2
              exit 1
            fi
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error title=Dispatch ref rejected::release image dispatch must run from refs/heads/main, got ${GITHUB_REF}" >&2
              exit 1
            fi
          else
            echo "::error title=Unsupported event::${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          {
            echo "### Release image guard"
            echo "- package version: ${version}"
            echo "- event: ${GITHUB_EVENT_NAME}"
            echo "- ref: ${GITHUB_REF}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          sha_short="${GITHUB_SHA::12}"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            {
              echo "store_tags<<TAGS"
              echo "${STORE_IMAGE}:${GITHUB_REF_NAME}"
              echo "${STORE_IMAGE}:sha-${sha_short}"
              echo "TAGS"
              echo "app_tags<<TAGS"
              echo "${APP_IMAGE}:${GITHUB_REF_NAME}"
              echo "${APP_IMAGE}:sha-${sha_short}"
              echo "TAGS"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "store_tags<<TAGS"
              echo "${STORE_IMAGE}:sha-${sha_short}"
              echo "${STORE_IMAGE}:test-${GITHUB_RUN_ID}"
              echo "TAGS"
              echo "app_tags<<TAGS"
              echo "${APP_IMAGE}:sha-${sha_short}"
              echo "${APP_IMAGE}:test-${GITHUB_RUN_ID}"
              echo "TAGS"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk for the store image
        # Headroom, no longer load-bearing after C0-3b. Before slimming, mcp-memory-service pulled the
        # CUDA torch wheel on BOTH amd64 and aarch64 (~3GB compressed) and a stock ubuntu runner ran
        # out of disk mid-build (proven: run 28818511823). The store now pins torch==2.13.0+cpu
        # (store-constraints.txt) so the image is ~1.7GB/arch with no CUDA closure; this runner
        # cleanup is kept only as cheap headroom for the multi-arch buildx + QEMU builds and the
        # digest scans. Inline rm (not a third-party action) keeps the supply-chain bar
        # SHA-pinned-or-nothing.
        shell: bash
        run: |
          set -euo pipefail
          df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h / | tail -1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build exactly once per image. push-by-digest publishes the multi-arch index UNTAGGED —
      # a content-addressed staging artifact no release tag points at until every scan passes.
      - name: Build and push store by digest (staging, untagged)
        id: build_store
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: store
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=ghcr.io/panellatech/panella-store,push-by-digest=true,name-canonical=true,push=true

      - name: Build and push app by digest (staging, untagged)
        id: build_app
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: app
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=ghcr.io/panellatech/panella-app,push-by-digest=true,name-canonical=true,push=true

      - name: Resolve per-platform digests from the pushed indexes
        id: digests
        shell: bash
        env:
          STORE_INDEX: ${{ steps.build_store.outputs.digest }}
          APP_INDEX: ${{ steps.build_app.outputs.digest }}
        run: |
          set -euo pipefail
          resolve() {
            local image="$1" index="$2" prefix="$3"
            local raw
            raw="$(docker buildx imagetools inspect --raw "${image}@${index}")"
            # Platform manifests only — buildx also attaches provenance/SBOM attestation manifests
            # with platform "unknown/unknown"; those are not scannable container images.
            local amd64 arm64 count
            amd64="$(jq -r '[.manifests[] | select(.platform.architecture == "amd64")][0].digest' <<<"${raw}")"
            arm64="$(jq -r '[.manifests[] | select(.platform.architecture == "arm64")][0].digest' <<<"${raw}")"
            count="$(jq -r '[.manifests[] | select(.platform.architecture != "unknown")] | length' <<<"${raw}")"
            if [[ "${count}" != "2" || "${amd64}" == "null" || "${arm64}" == "null" ]]; then
              echo "::error title=Unexpected index shape::${image}@${index} platform manifests=${count} amd64=${amd64} arm64=${arm64}" >&2
              exit 1
            fi
            echo "${prefix}_amd64=${amd64}" >> "$GITHUB_OUTPUT"
            echo "${prefix}_arm64=${arm64}" >> "$GITHUB_OUTPUT"
          }
          resolve "${STORE_IMAGE}" "${STORE_INDEX}" store
          resolve "${APP_IMAGE}" "${APP_INDEX}" app

      - name: Store Trivy breakglass annotation
        if: vars.PANELLA_RELEASE_SKIP_TRIVY == 'true'
        shell: bash
        run: |
          echo "::warning title=TRIVY SCAN SKIPPED::PANELLA_RELEASE_SKIP_TRIVY=true skipped the blocking store image scan. Unset the repository variable immediately after the breakglass release."
          echo "### TRIVY SCAN SKIPPED for store image" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository variable PANELLA_RELEASE_SKIP_TRIVY=true was active. Unset it immediately after this run." >> "$GITHUB_STEP_SUMMARY"

      # Every scan below targets an exact pushed digest — the same bytes the release tags will be
      # created from. This covers BOTH architectures (the old amd64 scan-proxy could not).
      - name: Trivy scan store amd64 digest
        if: vars.PANELLA_RELEASE_SKIP_TRIVY != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/panellatech/panella-store@${{ steps.digests.outputs.store_amd64 }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          # Constrained/unreachable HIGH CVEs, each with a per-CVE justification + expiry forcing
          # function; everything else stays a hard block. Explicit path — trivy does not auto-detect
          # the .yaml ignore form (only plain .trivyignore).
          trivyignores: .trivyignore.yaml
          format: table
          # Generous deadline: before C0-3b a ~5.5GB image blew trivy's 5m default mid-decompress
          # ("context deadline exceeded") — a false ZERO-finding block. Kept on every scan so a
          # future size regression cannot silently reintroduce it.
          timeout: "20m"

      - name: Trivy scan store arm64 digest
        if: vars.PANELLA_RELEASE_SKIP_TRIVY != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/panellatech/panella-store@${{ steps.digests.outputs.store_arm64 }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          trivyignores: .trivyignore.yaml
          format: table
          timeout: "20m"

      - name: App Trivy breakglass annotation
        if: vars.PANELLA_RELEASE_SKIP_TRIVY == 'true'
        shell: bash
        run: |
          echo "::warning title=TRIVY SCAN SKIPPED::PANELLA_RELEASE_SKIP_TRIVY=true skipped the blocking app image scan. Unset the repository variable immediately after the breakglass release."
          echo "### TRIVY SCAN SKIPPED for app image" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository variable PANELLA_RELEASE_SKIP_TRIVY=true was active. Unset it immediately after this run." >> "$GITHUB_STEP_SUMMARY"

      - name: Trivy scan app amd64 digest
        if: vars.PANELLA_RELEASE_SKIP_TRIVY != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/panellatech/panella-app@${{ steps.digests.outputs.app_amd64 }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          # Same justified ignore file as the store scans (the app image shares the cryptography
          # constraint); explicit path because trivy does not auto-detect the .yaml form.
          trivyignores: .trivyignore.yaml
          format: table
          timeout: "20m"

      - name: Trivy scan app arm64 digest
        if: vars.PANELLA_RELEASE_SKIP_TRIVY != 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/panellatech/panella-app@${{ steps.digests.outputs.app_arm64 }}
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
          trivyignores: .trivyignore.yaml
          format: table
          timeout: "20m"

      # Promotion = tagging the ALREADY-SCANNED index. imagetools create from a single source is a
      # registry-side manifest copy; the digest-equality assert makes "scanned bytes == released
      # bytes" fail-closed rather than assumed.
      - name: Promote store scanned digest to release tags
        id: promote_store
        shell: bash
        env:
          STORE_INDEX: ${{ steps.build_store.outputs.digest }}
          STORE_TAGS: ${{ steps.tags.outputs.store_tags }}
        run: |
          set -euo pipefail
          args=()
          first_tag=""
          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            [[ -z "${first_tag}" ]] && first_tag="${tag}"
            args+=(-t "${tag}")
          done <<<"${STORE_TAGS}"
          docker buildx imagetools create "${args[@]}" "${STORE_IMAGE}@${STORE_INDEX}"
          final="$(docker buildx imagetools inspect "${first_tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ "${final}" != "${STORE_INDEX}" ]]; then
            echo "::error title=Digest drift::promoted store digest ${final} must equal the scanned staging digest ${STORE_INDEX}" >&2
            exit 1
          fi
          echo "digest=${final}" >> "$GITHUB_OUTPUT"

      - name: Promote app scanned digest to release tags
        id: promote_app
        shell: bash
        env:
          APP_INDEX: ${{ steps.build_app.outputs.digest }}
          APP_TAGS: ${{ steps.tags.outputs.app_tags }}
        run: |
          set -euo pipefail
          args=()
          first_tag=""
          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            [[ -z "${first_tag}" ]] && first_tag="${tag}"
            args+=(-t "${tag}")
          done <<<"${APP_TAGS}"
          docker buildx imagetools create "${args[@]}" "${APP_IMAGE}@${APP_INDEX}"
          final="$(docker buildx imagetools inspect "${first_tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ "${final}" != "${APP_INDEX}" ]]; then
            echo "::error title=Digest drift::promoted app digest ${final} must equal the scanned staging digest ${APP_INDEX}" >&2
            exit 1
          fi
          echo "digest=${final}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign pushed image digests
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          STORE_REF: ${{ env.STORE_IMAGE }}@${{ steps.promote_store.outputs.digest }}
          APP_REF: ${{ env.APP_IMAGE }}@${{ steps.promote_app.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${STORE_REF}"
          cosign sign --yes "${APP_REF}"

      - name: Verify image signatures
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          STORE_REF: ${{ env.STORE_IMAGE }}@${{ steps.promote_store.outputs.digest }}
          APP_REF: ${{ env.APP_IMAGE }}@${{ steps.promote_app.outputs.digest }}
          CERT_IDENTITY: https://github.com/panellatech/panella/.github/workflows/release-images.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "${CERT_IDENTITY}" \
            "${STORE_REF}"
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "${CERT_IDENTITY}" \
            "${APP_REF}"

      - name: Generate digest-pinned compose file
        shell: bash
        env:
          STORE_REF: ${{ env.STORE_IMAGE }}@${{ steps.promote_store.outputs.digest }}
          APP_REF: ${{ env.APP_IMAGE }}@${{ steps.promote_app.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python3 scripts/release/pin_compose.py \
            --compose docker-compose.yml \
            --store-ref "${STORE_REF}" \
            --app-ref "${APP_REF}" \
            --version "${VERSION}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --event "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --head-sha "${GITHUB_SHA}" \
            --out-compose compose.pinned.yml \
            --out-digests digests.json
          expected_header="# managed by panella up — release ${VERSION} — do not edit (hand-edits: use the git-clone path; upgrades: docs/UPGRADE.md)"
          if [[ "$(head -n 1 compose.pinned.yml)" != "${expected_header}" ]]; then
            echo "::error title=Managed header missing::compose.pinned.yml must start with the release managed header" >&2
            exit 1
          fi
          # Interpolation-only placeholder: the pinned file keeps ${PANELLA_API_KEY:?...} required
          # vars, and `config` interpolates — without a value this validation step would fail on
          # every runner (no .env in CI).
          PANELLA_API_KEY=ci-validate-placeholder docker compose -f compose.pinned.yml config >/dev/null
          {
            echo "### Pinned compose artifact"
            echo "- store: ${STORE_REF}"
            echo "- app: ${APP_REF}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pinned compose artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: compose-pinned
          path: |
            compose.pinned.yml
            digests.json
          if-no-files-found: error
