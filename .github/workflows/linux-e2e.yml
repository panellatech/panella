name: linux-e2e

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel_chain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Build and push local release images
        shell: bash
        run: |
          set -euo pipefail
          # Same runner-disk reclaim the arbitrary_uid job and the release image workflow use before
          # the large store target; without it `docker build --target store` can exhaust disk.
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h
          docker build --target store -t 127.0.0.1:5001/panella-store:c0a .
          docker build --target app -t 127.0.0.1:5001/panella-app:c0a .
          docker push 127.0.0.1:5001/panella-store:c0a
          docker push 127.0.0.1:5001/panella-app:c0a
          STORE_DIGEST="$(docker image inspect --format='{{index .RepoDigests 0}}' 127.0.0.1:5001/panella-store:c0a | sed 's|.*@||')"
          APP_DIGEST="$(docker image inspect --format='{{index .RepoDigests 0}}' 127.0.0.1:5001/panella-app:c0a | sed 's|.*@||')"
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          python scripts/release/pin_compose.py --compose docker-compose.yml \
            --store-ref "127.0.0.1:5001/panella-store@${STORE_DIGEST}" \
            --app-ref "127.0.0.1:5001/panella-app@${APP_DIGEST}" \
            --version "${VERSION}" --run-id 0 --run-attempt 1 --event local --ref local \
            --head-sha "${GITHUB_SHA}" --out-compose panella_selfhost/_assets/compose.pinned.yml \
            --out-digests "${RUNNER_TEMP}/digests.json"

      - name: Build wheel and install it in an isolated venv
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U build
          python -m build
          python -m venv "${RUNNER_TEMP}/wheel-venv"
          "${RUNNER_TEMP}/wheel-venv/bin/pip" install dist/*.whl

      - name: Bootstrap fresh wheel box and verify idempotency
        shell: bash
        run: |
          set -euo pipefail
          export PANELLA_HOME="${RUNNER_TEMP}/wheel-box"
          "${RUNNER_TEMP}/wheel-venv/bin/panella" up --yes
          PROJ="panella-box-$(python -c 'import hashlib, os; print(hashlib.sha256(os.path.realpath(os.environ["PANELLA_HOME"]).encode()).hexdigest()[:8])')"
          IDS1="$(docker compose -p "${PROJ}" -f "${PANELLA_HOME}/docker-compose.yml" ps -q | sort)"
          test -n "${IDS1}"
          "${RUNNER_TEMP}/wheel-venv/bin/panella" up --yes
          IDS2="$(docker compose -p "${PROJ}" -f "${PANELLA_HOME}/docker-compose.yml" ps -q | sort)"
          test "${IDS1}" = "${IDS2}"
          docker compose -p "${PROJ}" -f "${PANELLA_HOME}/docker-compose.yml" down -v

  arbitrary_uid:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install the local CLI
        run: python -m pip install -e .

      - name: Create native-Linux operator state
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          tmp_env="$(mktemp .env.XXXXXX)"
          {
            printf 'PANELLA_API_KEY=%s\n' "$(python -c 'import secrets; print(secrets.token_hex(32))')"
            printf 'PANELLA_UID=%s\n' "$(id -u)"
            printf 'PANELLA_GID=%s\n' "$(id -g)"
          } > "$tmp_env"
          chmod 0600 "$tmp_env"
          mv "$tmp_env" .env
          mkdir -m 0700 .panella
          test "$(stat -c '%a' .env)" = 600
          test "$(stat -c '%a' .panella)" = 700
          test "$(stat -c '%u:%g' .panella)" = "$(id -u):$(id -g)"

      - name: Build both images
        shell: bash
        run: |
          set -euo pipefail
          df -h
          docker system df
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h
          docker system df
          docker compose build panella panella-http

      - name: Boot as the caller uid
        run: docker compose up -d --wait

      - name: Provision without logging the owner bearer
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          panella init --yes > .panella/init.stdout
          test "$(stat -c '%a' .panella/init.stdout)" = 600
          test "$(stat -c '%a' .panella/owner-bearer)" = 600

      - name: Verify native-Linux provisioning
        shell: bash
        run: |
          set -euo pipefail
          panella init --verify
          expected_uid="$(id -u)"
          for service in panella panella-http; do
            container_id="$(docker compose ps -q "$service")"
            test -n "$container_id"
            pid="$(docker inspect --format '{{.State.Pid}}' "$container_id")"
            actual_uid="$(awk '/^Uid:/{print $2; exit}' "/proc/$pid/status")"
            test "$actual_uid" = "$expected_uid"
            test "$actual_uid" != 0
          done
          test "$(stat -c '%u:%g' .panella)" = "$(id -u):$(id -g)"
          owner_bearer="$(cat .panella/owner-bearer)"
          curl --fail --silent --show-error --output /dev/null \
            -H "Authorization: Bearer $owner_bearer" \
            http://127.0.0.1:8001/v1/approvals/count
          unset owner_bearer

      - name: Verify container recreation preserves service-readable state
        shell: bash
        run: |
          set -euo pipefail
          docker compose down
          docker compose up -d --wait
          panella init --verify
          test "$(stat -c '%u:%g' .panella)" = "$(id -u):$(id -g)"

      - name: Smoke the documented pre-C0-U volume migration
        shell: bash
        run: |
          set -euo pipefail
          docker compose down
          docker compose run --rm --no-deps --user 0:0 --entrypoint sh panella-http -c \
            'find -P /app/data \( -type d -o -type f \) -exec chown 10001:10001 {} +'
          docker compose run --rm --no-deps --user 0:0 --entrypoint sh panella -c \
            'find -P /data /home/panella/.cache \( -type d -o -type f \) -exec chown 10001:10001 {} +'
          # Derive TARGET from Compose's EFFECTIVE resolved user (honors shell-over-.env precedence),
          # exactly as the documented migration does.
          TARGET="$(docker compose config --format json | python3 -c 'import json,sys; print(json.load(sys.stdin)["services"]["panella-http"]["user"])')"
          docker compose run --rm --no-deps --user 0:0 -e TARGET="$TARGET" --entrypoint sh panella-http -c \
            'find -P /app/data \( -type d -o -type f \) -exec chown "$TARGET" {} +'
          docker compose run --rm --no-deps --user 0:0 -e TARGET="$TARGET" --entrypoint sh panella -c \
            'find -P /data /home/panella/.cache \( -type d -o -type f \) -exec chown "$TARGET" {} +'
          docker compose up -d --wait
          owner_bearer="$(cat .panella/owner-bearer)"
          curl --fail --silent --show-error --output /dev/null \
            -H "Authorization: Bearer $owner_bearer" \
            http://127.0.0.1:8001/v1/approvals/count
          unset owner_bearer
          panella init --verify

      - name: Cleanup native-Linux E2E state
        if: always()
        shell: bash
        run: |
          set +e
          docker compose down --volumes --remove-orphans
          docker container prune --force
          docker volume prune --force
          rm -rf .env .panella
          df -h
          docker system df
