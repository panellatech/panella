name: release-pypi

on:
  workflow_dispatch:
    inputs:
      target:
        description: Package index target.
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
          - dryrun
      images_run_id:
        description: Successful release-images workflow run ID supplying the pinned compose bundle.
        type: string
        required: true

permissions:
  contents: read

concurrency: release-pypi-${{ inputs.target }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Assert package version context
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected="v${version}"
            if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
              echo "::error title=Package tag mismatch::expected ${expected}, got ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "### PyPI build version" >> "$GITHUB_STEP_SUMMARY"
            echo "- package version: ${version}" >> "$GITHUB_STEP_SUMMARY"
            echo "- dispatch ref: ${GITHUB_REF}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Install build tooling
        # pyyaml: assert-release-asset.py parses the embedded compose; the release job never
        # installs the project, so the parser dependency must be explicit here.
        run: python -m pip install -U 'build>=1.2,<2' 'twine>=5,<7' 'pyyaml>=6,<7'

      - name: Validate images run metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          # env indirection, never spliced into the script: a dispatch input is an arbitrary
          # string, and inline ${{ }} in run: would execute inside bash before the validator
          # sees it (the validator additionally requires a purely numeric run id).
          IMAGES_RUN_ID: ${{ inputs.images_run_id }}
          TARGET: ${{ inputs.target }}
        run: >-
          python scripts/ci/validate_images_run.py --phase metadata
          --run-id "$IMAGES_RUN_ID" --target "$TARGET" --version "$VERSION"
          --run-json-out "$RUNNER_TEMP/run.json" --artifact-id-out "$GITHUB_OUTPUT"

      - name: Download pinned compose artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ steps.meta.outputs.artifact_id }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.images_run_id }}
          path: ${{ runner.temp }}/artifact
          merge-multiple: true

      - name: Validate images run content
        env:
          TARGET: ${{ inputs.target }}
        run: >-
          python scripts/ci/validate_images_run.py --phase content
          --run-json "$RUNNER_TEMP/run.json" --digests "$RUNNER_TEMP/artifact/digests.json"
          --target "$TARGET" --version "$VERSION"

      - name: Materialize pinned compose asset
        run: cp "$RUNNER_TEMP/artifact/compose.pinned.yml" panella_selfhost/_assets/compose.pinned.yml

      - name: Build distribution artifacts
        run: python -m build

      - name: Check wheel contents
        run: python scripts/ci/check-wheel-contents.py dist

      - name: Assert release asset
        run: python scripts/ci/assert-release-asset.py dist "$RUNNER_TEMP/artifact/digests.json"

      - name: Twine check
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    if: inputs.target != 'dryrun'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Assert publish ref guard
        shell: bash
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [[ "${TARGET}" == "pypi" ]]; then
            expected="refs/tags/v${version}"
            if [[ "${GITHUB_REF}" != "${expected}" ]]; then
              echo "::error title=Real PyPI ref rejected::target=pypi requires ${expected}, got ${GITHUB_REF}" >&2
              exit 1
            fi
          elif [[ "${TARGET}" == "testpypi" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error title=TestPyPI ref rejected::target=testpypi requires refs/heads/main, got ${GITHUB_REF}" >&2
              exit 1
            fi
          else
            echo "::error title=Unknown PyPI target::${TARGET}" >&2
            exit 1
          fi

      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          # attestations default to true (v1.11+): with id-token:write + trusted publishing to a
          # PEP 740-capable index (TestPyPI qualifies), the action keyless-signs via Sigstore,
          # writing a PUBLIC, append-only Rekor entry (SAN = this repo + workflow + ref + commit).
          # TestPyPI is the ONLY pre-flip-reachable publish (target=pypi is blocked by the flip-day
          # interlock above), so it must NOT leak the private repo's identity/cadence to the
          # transparency log — same pre-flip zero-Rekor invariant the image cosign gating enforces.
          # Off until flip; the real-PyPI step re-enables provenance for public users.
          attestations: false

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/
          # Explicit (default already true): real-PyPI is flip-day only and the repo is public by
          # then, so PEP 740 attestations (Sigstore keyless -> public Rekor) are DESIRABLE
          # supply-chain provenance for downstream users.
          attestations: true
