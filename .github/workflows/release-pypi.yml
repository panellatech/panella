name: release-pypi

on:
  workflow_dispatch:
    inputs:
      target:
        description: Package index target.
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Assert package version context
        shell: bash
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected="v${version}"
            if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
              echo "::error title=Package tag mismatch::expected ${expected}, got ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            echo "### PyPI build version" >> "$GITHUB_STEP_SUMMARY"
            echo "- package version: ${version}" >> "$GITHUB_STEP_SUMMARY"
            echo "- dispatch ref: ${GITHUB_REF}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install build tooling
        run: python -m pip install -U build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Check wheel contents
        run: python scripts/ci/check-wheel-contents.py dist

      - name: Twine check
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Assert publish ref guard
        shell: bash
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [[ "${TARGET}" == "pypi" ]]; then
            expected="refs/tags/v${version}"
            if [[ "${GITHUB_REF}" != "${expected}" ]]; then
              echo "::error title=Real PyPI ref rejected::target=pypi requires ${expected}, got ${GITHUB_REF}" >&2
              exit 1
            fi
          elif [[ "${TARGET}" == "testpypi" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "::error title=TestPyPI ref rejected::target=testpypi requires refs/heads/main, got ${GITHUB_REF}" >&2
              exit 1
            fi
          else
            echo "::error title=Unknown PyPI target::${TARGET}" >&2
            exit 1
          fi

      - name: Real PyPI flip-day interlock
        if: inputs.target == 'pypi'
        run: |
          echo "::error title=Real PyPI disabled::real-PyPI publish is a flip-day action; remove this guard in the flip-day PR"
          exit 1

      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          # attestations default to true (v1.11+): with id-token:write + trusted publishing to a
          # PEP 740-capable index (TestPyPI qualifies), the action keyless-signs via Sigstore,
          # writing a PUBLIC, append-only Rekor entry (SAN = this repo + workflow + ref + commit).
          # TestPyPI is the ONLY pre-flip-reachable publish (target=pypi is blocked by the flip-day
          # interlock above), so it must NOT leak the private repo's identity/cadence to the
          # transparency log — same pre-flip zero-Rekor invariant the image cosign gating enforces.
          # Off until flip; the real-PyPI step re-enables provenance for public users.
          attestations: false

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/
          # Explicit (default already true): real-PyPI is flip-day only and the repo is public by
          # then, so PEP 740 attestations (Sigstore keyless -> public Rekor) are DESIRABLE
          # supply-chain provenance for downstream users.
          attestations: true
