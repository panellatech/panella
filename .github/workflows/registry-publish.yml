name: registry-publish

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Preflight — PyPI has server.json's version with the ownership marker
        run: |
          python3 - <<'EOF'
          import json, urllib.request
          data = json.load(open("server.json"))
          version = data["version"]
          assert data["packages"][0]["version"] == version, "server.json version fields drifted"
          info = json.load(urllib.request.urlopen(f"https://pypi.org/pypi/panella/{version}/json"))
          desc = info["info"]["description"] or ""
          assert "mcp-name: io.github.panellatech/panella" in desc, \
              f"ownership marker missing from PyPI {version} README"
          print("preflight OK:", version)
          EOF

      - name: Install mcp-publisher 1.8.0 (checksum-pinned)
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz"
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher

      - name: Login to the MCP registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish

      - name: Verify listed
        run: |
          sleep 10
          curl -fsS "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.panellatech%2Fpanella" \
            | grep -q '"io.github.panellatech/panella"'
